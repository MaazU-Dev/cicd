name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set Up Goose(for Migrations)
        uses: goose-lang/setup-goose@v1
        with:
          goose-version: "latest"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
      
      - name: build
        run: scripts/buildprod.sh

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3       

      - name: Build and Push to Artifact Registry
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-488519/notely-ar-repo/notely:latest

      - name: Run Migrations
        run: scripts/migrateup.sh

      - name: Deploy to Cloud Run
        # run: gcloud run deploy notely --image REGION-docker.pkg.dev/PROJECT_ID/REPO_NAME/IMAGE:TAG --region REGION --allow-unauthenticated --project PROJECT_ID --max-instances=4
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-488519/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-488519 --max-instances=4